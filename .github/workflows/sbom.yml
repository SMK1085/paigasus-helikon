name: sbom

on:
  push:
    tags:
      - "paigasus-helikon-v*"

concurrency:
  group: sbom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # tags are immutable; never cancel an in-flight run

permissions:
  contents: write   # create release / upload asset

env:
  CARGO_TERM_COLOR: always

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Facade crate with --all-features captures the full workspace
          # surface (paigasus-helikon-core unconditionally + 10 siblings).
          # cargo-cyclonedx 0.5.x has no -p flag; target the crate via
          # --manifest-path. Default --spec-version is 1.3, so pin 1.5
          # explicitly.
          cargo cyclonedx \
            --manifest-path crates/paigasus-helikon/Cargo.toml \
            --format json \
            --spec-version 1.5 \
            --all-features
          # cargo-cyclonedx 0.5.x writes <crate-name>.cdx.json under the
          # package dir. Defensive find in case the filename pattern shifts.
          SBOM="$(find crates/paigasus-helikon -maxdepth 1 -name '*.cdx.json' | head -n1)"
          test -n "$SBOM"
          cp "$SBOM" "paigasus-helikon-${REF_NAME}-cyclonedx.json"

      - name: Verify SBOM is parseable CycloneDX 1.5 JSON
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          jq -e '.bomFormat == "CycloneDX" and .specVersion == "1.5"' \
            "paigasus-helikon-${REF_NAME}-cyclonedx.json"

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v3
        with:
          files: "paigasus-helikon-${{ github.ref_name }}-cyclonedx.json"
          fail_on_unmatched_files: true
