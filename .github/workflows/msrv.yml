name: msrv

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: msrv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      # cargo-msrv has no --workspace flag; verify one representative crate
      # whose rust-version inherits from [workspace.package]. Since every
      # member uses `rust-version.workspace = true`, a green check on one
      # inheriting crate is a green check on all of them.
      - run: cargo msrv --path crates/paigasus-helikon-core verify
