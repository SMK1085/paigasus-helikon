name: Bug report
description: Report something that does not work as expected.
title: "bug: "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you can give, the faster we can help.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps (and a code snippet if possible) to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: paigasus-version
    attributes:
      label: paigasus-helikon version
      placeholder: "0.0.0 / commit abc1234"
    validations:
      required: true
  - type: input
    id: rustc-version
    attributes:
      label: rustc version
      placeholder: "rustc 1.79.0 (stable)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify in additional context)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
