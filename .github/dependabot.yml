version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels: ["area:deps"]
    assignees: ["SMK1085"]
    groups:
      tokio-stack:
        patterns:
          - "tokio*"
          - "tower*"
          - "hyper*"
          - "reqwest*"
      tracing-otel:
        patterns:
          - "tracing*"
          - "opentelemetry*"
      serde-stack:
        patterns:
          - "serde*"
          - "schemars"
          - "serde_with*"
      rust-major:
        patterns: ["*"]
        update-types: ["major"]
      rust-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels: ["area:deps"]
    assignees: ["SMK1085"]
    groups:
      gh-actions:
        patterns: ["*"]
