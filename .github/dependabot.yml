version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels: ["area:deps"]
    assignees: ["SMK1085"]
    ignore:
      # jiff 0.2.29 activates a `defmt` integration that pulls the unmaintained
      # `proc-macro-error2` (RUSTSEC-2026-0173), failing `cargo audit`. Matches
      # the `=0.2.28` pin in the root Cargo.toml. Drop this once a later jiff
      # release sheds that transitive dep (a newer version will be re-proposed).
      - dependency-name: "jiff"
        versions: ["0.2.29"]
    groups:
      tokio-stack:
        patterns:
          - "tokio*"
          - "tower*"
          - "hyper*"
          - "reqwest*"
      tracing-otel:
        patterns:
          - "tracing*"
          - "opentelemetry*"
      serde-stack:
        patterns:
          - "serde*"
          - "schemars"
          - "serde_with*"
      rust-major:
        patterns: ["*"]
        update-types: ["major"]
      rust-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels: ["area:deps"]
    assignees: ["SMK1085"]
    groups:
      gh-actions:
        patterns: ["*"]
