# deny.toml — cargo-deny policy for the Helikon workspace.
# Reference: https://embarkstudios.github.io/cargo-deny/

[graph]
# Constrain the graph to the targets we claim to support. A wider target list
# makes cargo-deny's graph quadratically larger for no signal.
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — RustSec database. cargo-audit runs the same DB; deny lives
# here so policy (yanked, ignore list) is auditable in a single file.
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  # No active advisory ignores needed — the stale rsa (RUSTSEC-2023-0071) and
  # async-std (RUSTSEC-2025-0052) entries covered crates that left the
  # lockfile in an earlier dependency update; noticed and removed during the
  # SMA-327 deny/audit reconciliation.
]

# ---------------------------------------------------------------------------
# Licenses — ticket allowlist plus Unicode-3.0 (the rebrand of
# Unicode-DFS-2016 used by unicode-ident >= 1.0.13).
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",                          # foldhash (via sqlx-core → hashbrown → hashlink); permissive OSI/FSF-approved license
  "Apache-2.0 WITH LLVM-exception", # winx (via cap-std → cap-primitives, pulled by paigasus-helikon-tools); not OR-licensed, so the Apache/MIT fallback doesn't apply
  "BSL-1.0",                        # Boost Software License 1.0 (OSI/FSF approved, permissive); xxhash-rust (via redis → paigasus-helikon-sessions-redis)
  "CDLA-Permissive-2.0",            # Community Data License Agreement Permissive 2.0 (Linux Foundation); webpki-roots Mozilla root CA certs (via sqlx-core → paigasus-helikon-sessions-postgres)
]
exceptions = []

# ---------------------------------------------------------------------------
# Bans — empty allow/deny lists; `wildcards = "deny"` enforces precise
# version constraints, `multiple-versions = "warn"` because transitive dupes
# are unavoidable while the workspace is small.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal dev-dependencies are declared path-only (no version) to break the
# core<->macros publish cycle, which cargo treats as a wildcard requirement.
# Allow wildcards for PATH deps only; registry wildcards stay denied.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — crates.io only; deny git-only deps until we have a concrete
# reason to allow one.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
