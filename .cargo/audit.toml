# .cargo/audit.toml — cargo-audit policy for the Helikon workspace.
# Reference: https://docs.rs/cargo-audit/latest/cargo_audit/config/index.html
#
# Kept in sync with the [advisories].ignore list in /deny.toml — both tools
# run as required CI gates (see .github/workflows/audit.yml and the deny job
# in ci.yml) and must agree on what is policy-allowed.

[advisories]
ignore = [
    # No active advisory ignores needed — both rsa (RUSTSEC-2023-0071) and
    # async-std (RUSTSEC-2025-0052) were dropped from the lockfile when rmcp 1.7
    # replaced the older opentelemetry_sdk 0.27.x dev-dep tree (SMA-327).
]
